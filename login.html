<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<title>RC-Tech Solutions — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#09090b;color:#fafafa;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;}

.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;}
.bg-orb-1{width:400px;height:400px;top:30%;right:-10%;background:rgba(99,102,241,.05);}
.bg-orb-2{width:350px;height:350px;bottom:20%;left:-10%;background:rgba(59,130,246,.04);}

.wrap{width:100%;max-width:380px;padding:24px;position:relative;z-index:1;}
.logo-link{display:flex;justify-content:center;margin-bottom:32px;}
.logo-link img{height:48px;width:auto;}

.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:32px;}
.card h2{font-size:16px;font-weight:700;text-align:center;margin-bottom:24px;}

label{display:block;font-size:11px;color:rgba(255,255,255,.3);font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
input{width:100%;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fafafa;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
input:focus{border-color:rgba(99,102,241,.4);box-shadow:0 0 0 2px rgba(99,102,241,.1);}
input::placeholder{color:rgba(255,255,255,.15);}

.field{margin-bottom:16px;}
.btn-submit{width:100%;padding:12px;border-radius:8px;background:#fafafa;color:#09090b;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;margin-top:8px;}
.btn-submit:hover{background:#e4e4e7;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

.error{display:none;margin-bottom:16px;padding:10px 14px;border-radius:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#f87171;font-size:13px;text-align:center;}
.error.show{display:block;}

.back{display:block;text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,.2);text-decoration:none;transition:color .15s;}
.back:hover{color:rgba(255,255,255,.5);}

.foot{position:absolute;bottom:24px;text-align:center;font-size:11px;color:rgba(255,255,255,.08);}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="wrap">
  <a href="index.html" class="logo-link">
    <img src="logo.png" alt="RC-Tech Solutions">
  </a>

  <div class="card">
    <h2>Login</h2>

    <div class="error" id="error">Benutzername oder Passwort falsch.</div>

    <form id="loginForm">
      <div class="field">
        <label for="user">Benutzername</label>
        <input type="text" id="user" name="username" autocomplete="username" placeholder="Benutzername" required>
      </div>
      <div class="field">
        <label for="pass">Passwort</label>
        <input type="password" id="pass" name="password" autocomplete="current-password" placeholder="Passwort" required>
      </div>
      <button type="submit" class="btn-submit" id="btn">Anmelden</button>
    </form>
  </div>

  <a href="index.html" class="back">← Zurück</a>
</div>

<div class="foot">&copy; 2026 R. Camathias, Tech Solutions</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var u = document.getElementById('user').value;
  var p = document.getElementById('pass').value;
  var err = document.getElementById('error');
  var btn = document.getElementById('btn');

  btn.disabled = true;
  btn.textContent = 'Prüfe...';
  err.classList.remove('show');

  setTimeout(function() {
    if (u === 'demo' && p === 'demo!2026') {
      sessionStorage.setItem('rc_auth', '1');
      window.location.href = 'de.html';
    } else {
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Anmelden';
    }
  }, 600);
});
</script>

</body>
</html>
