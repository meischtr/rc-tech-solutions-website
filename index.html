<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<title>RC-Tech Solutions — Coming Soon</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#09090b;color:#fafafa;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;}
::selection{background:rgba(99,102,241,.3);}

/* BG */
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;}
.bg-orb-1{width:500px;height:500px;top:20%;left:-10%;background:rgba(59,130,246,.06);animation:drift 20s ease-in-out infinite;}
.bg-orb-2{width:400px;height:400px;bottom:10%;right:-10%;background:rgba(99,102,241,.05);animation:drift 25s ease-in-out infinite 5s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}

/* Content */
.content{text-align:center;padding:32px;max-width:640px;position:relative;z-index:1;}
.logo{height:72px;width:auto;margin-bottom:48px;}
h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-bottom:56px;}
h1 span{color:#6366f1;}

/* Login - dezent */
.btn-login{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:6px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);font-size:12px;font-weight:500;transition:all .15s;border:1px solid rgba(255,255,255,.06);text-decoration:none;margin-bottom:64px;}
.btn-login:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.08);}
.btn-login svg{width:12px;height:12px;}

/* Saasiro link */
.saasiro-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.15);font-weight:500;text-decoration:none;transition:color .15s;}
.saasiro-link:hover{color:rgba(255,255,255,.35);}
.saasiro-link span{color:#6366f1;opacity:.4;transition:opacity .15s;}
.saasiro-link:hover span{opacity:.7;}

/* Footer */
.foot{position:absolute;bottom:32px;text-align:center;font-size:11px;color:rgba(255,255,255,.1);}

/* Lang */
.lang{position:absolute;top:20px;right:24px;display:flex;gap:2px;}
.lang a{font-size:11px;color:rgba(255,255,255,.2);padding:4px 6px;border-radius:4px;text-decoration:none;font-weight:500;transition:all .15s;}
.lang a:hover{color:rgba(255,255,255,.5);}
.lang a.active{color:rgba(255,255,255,.6);background:rgba(255,255,255,.05);}

@media(max-width:640px){
  .logo{height:52px;}.btns{flex-direction:column;align-items:center;}
  .btn-login,.btn-saasiro{width:100%;justify-content:center;}
}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="lang">
  <a href="#" data-lang="de" class="active">DE</a>
  <a href="#" data-lang="en">EN</a>
  <a href="#" data-lang="fr">FR</a>
  <a href="#" data-lang="it">IT</a>
  <a href="#" data-lang="es">ES</a>
  <a href="#" data-lang="sr">SR</a>
</div>

<div class="content">
  <img src="logo.png" alt="RC-Tech Solutions" class="logo">

  <h1 id="headline">hier entsteht <span>Grosses.</span></h1>

  <a href="login.html" class="btn-login" id="loginBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
    Login
  </a>

  <a href="https://saasiro.com" class="saasiro-link" target="_blank" id="saasLink">
    <span>saasiro.com</span> — <em id="saasText">hier entsteht auch Grosses.</em>
  </a>
</div>

<div class="foot">&copy; 2026 R. Camathias, Tech Solutions — rc-tech-solutions.com</div>

<script>
var t={
  de:{h:'hier entsteht <span>Grosses.</span>',s:'hier entsteht auch Grosses.',l:'Login'},
  en:{h:'something big is <span>coming.</span>',s:'something big is coming here too.',l:'Login'},
  fr:{h:'quelque chose de grand <span>arrive.</span>',s:'ici aussi, quelque chose de grand arrive.',l:'Connexion'},
  it:{h:'qualcosa di grande <span>sta arrivando.</span>',s:'anche qui sta arrivando qualcosa di grande.',l:'Accedi'},
  es:{h:'algo grande está <span>llegando.</span>',s:'aquí también está llegando algo grande.',l:'Acceso'},
  sr:{h:'nešto veliko <span>dolazi.</span>',s:'i ovde nastaje nešto veliko.',l:'Prijava'}
};
document.querySelectorAll('.lang a').forEach(function(a){
  a.addEventListener('click',function(e){
    e.preventDefault();
    var l=this.dataset.lang;
    document.getElementById('headline').innerHTML=t[l].h;
    document.getElementById('saasText').textContent=t[l].s;
    document.getElementById('loginBtn').lastChild.textContent=' '+t[l].l;
    document.querySelectorAll('.lang a').forEach(function(x){x.classList.remove('active');});
    this.classList.add('active');
  });
});
</script>

</body>
</html>
