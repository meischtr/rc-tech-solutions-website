<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09090b">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<title>RC-Tech Solutions</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script>
(function(){
  try{
    var lang=(navigator.language||navigator.userLanguage||'de').toLowerCase();
    var target=lang.indexOf('de')===0?'/de/':'/en/';
    window.location.replace(target);
  }catch(e){
    window.location.replace('/de/');
  }
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=/de/"></noscript>
<style>
html,body{margin:0;padding:0;background:#09090b;color:#fafafa;font-family:system-ui,-apple-system,sans-serif;height:100%;}
.fallback{display:flex;align-items:center;justify-content:center;height:100vh;gap:24px;font-size:14px;}
.fallback a{color:#a5b4fc;text-decoration:none;padding:8px 16px;border:1px solid rgba(255,255,255,.1);border-radius:6px;transition:all .15s;}
.fallback a:hover{color:#fff;border-color:rgba(255,255,255,.3);}
</style>
</head>
<body>
<div class="fallback">
  <a href="/de/">Deutsch</a>
  <a href="/en/">English</a>
</div>
</body>
</html>
