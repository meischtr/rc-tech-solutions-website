<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<title>RC-Tech Solutions — Coming Soon</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#09090b;color:#fafafa;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:rgba(99,102,241,.3);}

/* BG */
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;will-change:transform;}
.bg-orb-1{width:500px;height:500px;top:20%;left:-10%;background:rgba(59,130,246,.06);animation:drift 20s ease-in-out infinite;}
.bg-orb-2{width:400px;height:400px;bottom:10%;right:-10%;background:rgba(99,102,241,.05);animation:drift 25s ease-in-out infinite 5s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}
@media(max-width:640px){.bg-orb{display:none;}}
@media(prefers-reduced-motion:reduce){.bg-orb{animation:none;}}

/* Content */
.content{text-align:center;padding:32px;max-width:640px;position:relative;z-index:1;}
.logo{height:72px;width:auto;margin-bottom:48px;}
h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-bottom:56px;}
h1 span{color:#6366f1;}



/* Footer */
.foot{position:absolute;bottom:32px;text-align:center;font-size:11px;color:rgba(255,255,255,.1);}

/* Top bar */
.top-bar{position:absolute;top:20px;right:24px;display:flex;align-items:center;gap:12px;z-index:10;}
.lang{display:flex;gap:2px;}
.lang a{font-size:11px;color:rgba(255,255,255,.2);padding:4px 6px;border-radius:4px;text-decoration:none;font-weight:500;transition:all .15s;}
.lang a:hover{color:rgba(255,255,255,.5);}
.lang a.active{color:rgba(255,255,255,.6);background:rgba(255,255,255,.05);}
.top-login{font-size:11px;color:rgba(255,255,255,.15);text-decoration:none;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.06);transition:all .15s;display:flex;align-items:center;gap:4px;}
.top-login:hover{color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.12);}
.top-login svg{width:11px;height:11px;}

@media(max-width:640px){
  .logo{height:52px;}.btns{flex-direction:column;align-items:center;}
  .btn-login{width:100%;justify-content:center;}
}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="top-bar">
  <div class="lang">
    <a href="#" data-lang="de" class="active">DE</a>
    <a href="#" data-lang="en">EN</a>
    <a href="#" data-lang="fr">FR</a>
    <a href="#" data-lang="it">IT</a>
    <a href="#" data-lang="es">ES</a>
    <a href="#" data-lang="sr">SR</a>
  </div>
  <a href="login.html" class="top-login" id="loginBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
    <span id="loginLabel">Login</span>
  </a>
</div>

<div class="content">
  <img src="logo.png" alt="RC-Tech Solutions" class="logo">

  <h1 id="headline">hier entsteht <span>Grosses.</span></h1>

</div>

<div class="foot">&copy; 2026 RC-Tech Solutions GmbH — rc-tech-solutions.com</div>

<script>
var t={
  de:{h:'hier entsteht <span>Grosses.</span>',l:'Login'},
  en:{h:'something big is <span>coming.</span>',l:'Login'},
  fr:{h:'quelque chose de grand <span>arrive.</span>',l:'Connexion'},
  it:{h:'qualcosa di grande <span>sta arrivando.</span>',l:'Accedi'},
  es:{h:'algo grande está <span>llegando.</span>',l:'Acceso'},
  sr:{h:'nešto veliko <span>dolazi.</span>',l:'Prijava'}
};
document.querySelectorAll('.lang a').forEach(function(a){
  a.addEventListener('click',function(e){
    e.preventDefault();
    var l=this.dataset.lang;
    document.getElementById('headline').innerHTML=t[l].h;
    document.getElementById('loginLabel').textContent=t[l].l;
    document.querySelectorAll('.lang a').forEach(function(x){x.classList.remove('active');});
    this.classList.add('active');
  });
});
</script>

</body>
</html>
